name: Ref Zero — YOLO11 Training CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/train.py'
      - 'backend/model_config.py'
      - 'data/data.yaml'
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Number of training epochs'
        required: true
        default: '3'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ultralytics
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install ultralytics wandb

      - name: Create minimal smoke-test dataset
        run: |
          mkdir -p data/smoke-test/train/images \
                   data/smoke-test/train/labels \
                   data/smoke-test/valid/images \
                   data/smoke-test/valid/labels
          # Create 2 tiny blank images for smoke test
          python3 -c "
          from PIL import Image
          import os
          for split in ['train','valid']:
              for i in range(2):
                  img = Image.new('RGB', (640,640), color=(100,100,100))
                  img.save(f'data/smoke-test/{split}/images/img{i}.jpg')
                  open(f'data/smoke-test/{split}/labels/img{i}.txt','w').close()
          print('Smoke test dataset created')
          "
          cat > data/smoke-test.yaml << 'EOF'
          path: data/smoke-test
          train: train/images
          val: valid/images
          nc: 3
          names: ['foul', 'no-foul', 'contact']
          EOF

      - name: Run training smoke test
        env:
          WANDB_DISABLED: "true"
        run: |
          yolo train \
            model=yolo11n.pt \
            data=data/smoke-test.yaml \
            epochs=${{ inputs.epochs || '3' }} \
            imgsz=64 \
            batch=2 \
            project=runs/detect \
            name=ci-smoke-test \
            exist_ok=True \
            plots=True \
            device=cpu \
            verbose=False

      - name: Verify checkpoint was saved
        run: |
          if [ -f runs/detect/ci-smoke-test/weights/best.pt ]; then
            echo "Checkpoint saved successfully"
            ls -lh runs/detect/ci-smoke-test/weights/
          else
            echo "No checkpoint found"
            exit 1
          fi

      - name: Upload checkpoint artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-checkpoint-${{ github.sha }}
          path: runs/detect/ci-smoke-test/weights/
          retention-days: 7