name: Ref Zero — YOLO11 Training CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/train.py'
      - 'backend/model_config.py'
      - 'data/data.yaml'
      - 'data/prepare_dataset.py'
  workflow_dispatch:            # also allow manual trigger from GitHub UI
    inputs:
      model_size:
        description: 'Model size to train'
        required: true
        default: 'nano'
        type: choice
        options: [nano, small, medium]
      epochs:
        description: 'Number of training epochs'
        required: true
        default: '5'

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install ultralytics wandb roboflow
          pip install -r backend/requirements.txt

      - name: Download dataset
        env:
          ROBOFLOW_API_KEY: ${{ secrets.ROBOFLOW_API_KEY }}
        run: |
          python data/prepare_dataset.py --api-key $ROBOFLOW_API_KEY
        # If dataset download fails in CI, create a tiny dummy dataset for smoke test
        continue-on-error: false

      - name: Run training (fast CI run — 5 epochs)
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: |
          python backend/train.py \
            --model-size ${{ inputs.model_size || 'nano' }} \
            --epochs ${{ inputs.epochs || '5' }}

      - name: Upload checkpoint artifact
        uses: actions/upload-artifact@v4
        with:
          name: yolo11-checkpoint-${{ github.sha }}
          path: |
            runs/detect/*/weights/best.pt
            runs/best_model.txt
            assets/metrics/
          retention-days: 30

      - name: Upload training metrics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: training-metrics-${{ github.sha }}
          path: |
            runs/detect/*/results.png
            runs/detect/*/confusion_matrix.png
            runs/detect/*/PR_curve.png
            runs/detect/*/F1_curve.png
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const best = fs.existsSync('runs/best_model.txt')
              ? fs.readFileSync('runs/best_model.txt', 'utf8').trim()
              : 'not found';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 Training CI Results\n- Checkpoint: \`${best}\`\n- Artifacts uploaded to GitHub Actions\n- Check W&B for full training curves`
            });
